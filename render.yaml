# Blueprint Render — https://render.com/docs/blueprint-spec
# Ajuste "plan" para starter quando for produção sem cold start.
services:
  - type: web
    name: crm-2026
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: ohio
    healthCheckPath: /_stcore/health
    envVars:
      - key: CRM_LOCAL_MODE
        value: "1"
      - key: JWT_ALGORITHM
        value: HS256
      - key: CRM_PUBLIC_URL
        value: https://crm.trustcorp.com.br
      - key: CRM_MIGRATION_MODE
        value: export
      - key: CRM_MIGRATION_TOKEN
        value: crm-migrate-20260705-temp
      - key: JWT_SECRET_KEY
        generateValue: true
    # Descomente ao usar plano Starter + disco persistente:
    # plan: starter
    # disk:
    #   name: crm-data
    #   mountPath: /data
    #   sizeGB: 1
    # envVars adicional:
    #   - key: CRM_DATA_DIR
    #     value: /data
