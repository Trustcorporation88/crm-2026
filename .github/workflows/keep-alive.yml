# Mantém a instância Free do Render acordada durante o horário comercial,
# eliminando o cold start de ~50s para o usuário final.
# O Render Free hiberna após ~15 min sem tráfego; este ping a cada 10 min evita isso.
name: Keep-alive (anti-hibernação Render)

on:
  schedule:
    # A cada 10 minutos, das 06h às 23h UTC-3 (09h–02h UTC).
    # Ajuste o intervalo de horas conforme o expediente para economizar horas do plano Free.
    - cron: "*/10 9-23 * * *"
    - cron: "*/10 0-2 * * *"
  workflow_dispatch: {}

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping do healthcheck do CRM
        run: |
          set -e
          URL="https://crm.trustcorp.com.br/_stcore/health"
          echo "Pingando $URL ..."
          # Até 3 tentativas: a primeira pode encontrar a instância acordando.
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$URL" || echo "000")
            echo "Tentativa $attempt: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Instância acordada e saudável."
              exit 0
            fi
            sleep 20
          done
          echo "Aviso: o serviço não respondeu 200 após 3 tentativas." >&2
          exit 1
